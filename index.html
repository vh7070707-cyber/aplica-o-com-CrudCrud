<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM de Clientes</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header class="header">
            <h1>CRM de Clientes</h1>
            <p>Gerencie seus clientes</p>
        </header>

        <section class="dashboard">

            <div class="card">
                <h3>Total de Clientes</h3>
                <span id="totalClientes">0</span>
            </div>

        </section>

        <section class="cadastro">

            <h2>Cadastrar Cliente</h2>

            <form id="formCliente">

                <div class="campo">
                    <label>Nome</label>
                    <input
                        type="text"
                        id="nome"
                        required>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input
                        type="email"
                        id="email"
                        required>
                </div>

                <div class="campo">
                    <label>Telefone</label>
                    <input
                        type="text"
                        id="telefone"
                        required>
                </div>

                <button
                    type="submit"
                    class="btnSalvar">

                    Cadastrar

                </button>

            </form>

        </section>

        <section class="busca">

            <input
                type="text"
                id="campoBusca"
                placeholder="Pesquisar cliente...">

        </section>

        <section class="clientes">

            <h2>Lista de Clientes</h2>

            <table>

                <thead>

                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="listaClientes">

                </tbody>

            </table>

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
